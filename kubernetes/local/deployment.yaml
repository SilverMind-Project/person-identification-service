# Local deployment (dgx-box cluster, microk8s registry)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: person-id
  labels:
    app: person-id
spec:
  replicas: 1
  selector:
    matchLabels:
      app: person-id
  template:
    metadata:
      labels:
        app: person-id
    spec:
      containers:
      - name: person-id
        image: localhost:32000/person-id:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8100
          name: http
        env:
        - name: CUDA_DEVICE_ID
          value: "0"
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
            nvidia.com/gpu: "1"
          limits:
            cpu: "2"
            memory: "8Gi"
            nvidia.com/gpu: "1"
        readinessProbe:
          httpGet:
            path: /health
            port: 8100
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8100
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: person-id-data
