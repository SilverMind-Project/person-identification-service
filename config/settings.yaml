# Person Identification Service Settings
#
# Runtime overrides: any ${VAR:default} placeholder can be set via environment
# variable. Pass them through docker-compose's `environment:` section or the
# host environment. Example:
#
#   CUDA_DEVICE_ID=1 uvicorn app.main:app ...
#
# All other settings require editing this file or mounting a custom config/.

app:
  name: "Person Identification Service"
  version: "1.0.0"

server:
  host: "0.0.0.0"
  port: 8100

# Face detection & recognition
face_engine:
  # InsightFace model pack. buffalo_l = accurate, buffalo_s = faster.
  # Override: PERSON_ID_MODEL=buffalo_s
  model_name: "${PERSON_ID_MODEL:buffalo_l}"
  # Directory for cached InsightFace model files.
  # Lives under /app/data so it persists across container restarts.
  model_root: "data/models"
  # GPU device index. 0 = first GPU, -1 = CPU fallback.
  # Override: CUDA_DEVICE_ID=-1
  ctx_id: "${CUDA_DEVICE_ID:0}"
  # Detection input size [width, height]. Larger = more accurate but slower.
  det_size: [640, 640]
  # Minimum face detection confidence (0.0 - 1.0).
  # Override: DETECTION_THRESHOLD=0.6
  det_threshold: "${DETECTION_THRESHOLD:0.5}"

# Recognition / identification
recognition:
  # Cosine similarity threshold for positive identification.
  # Faces below this are classified as "unknown".
  # Override: RECOGNITION_THRESHOLD=0.35
  threshold: "${RECOGNITION_THRESHOLD:0.4}"
  # Below this threshold, face is "definitely unknown" (not even uncertain).
  unknown_threshold: 0.25

# Motion direction detection
motion:
  # Minimum displacement as fraction of frame dimension to count as movement.
  min_displacement_fraction: 0.05
  # Minimum cosine similarity to consider the same unknown person across frames.
  cross_frame_similarity: 0.5

# Enrollment storage
storage:
  db_path: "data/face_db.sqlite"
  embeddings_dir: "data/embeddings"
  guest_images_dir: "data/guests"

# Image annotation (bounding boxes + labels)
annotation:
  box_color_known: [0, 200, 0]       # BGR green for identified persons
  box_color_unknown: [0, 165, 255]    # BGR orange for unknown persons
  text_scale: 0.7
  text_thickness: 2
  box_thickness: 2

# Logging
# Override: LOG_LEVEL=DEBUG
logging:
  level: "${LOG_LEVEL:INFO}"
